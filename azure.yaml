# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: lebe-solarenergie-administration
workflows:
  up:
    steps:
      - azd: provision
      - azd: deploy --all
services:
  web:
    project: ./src/web
    dist: dist
    language: js
    host: staticwebapp
    hooks:
      # Creates a temporary `.env.local` file for the build command. Vite will automatically use it during build.
      # The expected/required values are mapped to the infrastructure outputs.
      # .env.local is ignored by git, so it will not be committed if, for any reason, if deployment fails.
      # see: https://vitejs.dev/guide/env-and-mode
      # Note: Notice that dotenv must be a project dependency for this to work. See package.json.
      prepackage:
        windows:
          shell: pwsh
          run: |
            "VITE_API_BASE_URL=""$env:API_BASE_URL""" | Out-File -FilePath .env.local -Encoding utf8
            "VITE_AZURE_AD_TENANT_ID=""$env:AZURE_AD_TENANT_ID""" | Add-Content -Path .env.local
            "VITE_AZURE_AD_CLIENT_ID=""$env:AZURE_AD_CLIENT_ID""" | Add-Content -Path .env.local
        posix:
          shell: sh
          run: |
            echo VITE_API_BASE_URL=\"$API_BASE_URL\" > .env.local
            echo VITE_AZURE_AD_TENANT_ID=\"$AZURE_AD_TENANT_ID\" >> .env.local
            echo VITE_AZURE_AD_CLIENT_ID=\"$AZURE_AD_CLIENT_ID\" >> .env.local
      postdeploy:
        windows:
          shell: pwsh
          run: 'rm .env.local'
        posix:
          shell: sh
          run: 'rm .env.local'
  webclient:
    project: ./src/web-client
    dist: out
    language: js
    host: staticwebapp
    hooks:
      # `azd deploy webclient` always runs its own `npm run build` as part of its packaging
      # phase (it does not reuse any build done earlier in the workflow) — so
      # WEB_CLIENT_API_BASE_URL must be present as a build-time env var right here, not just
      # in an earlier manual build step. Next.js loads .env.local automatically for
      # server-side process.env access, no extra dependency needed (unlike Vite).
      # web-client-deploy.yml keeps the local web-client-api process alive (and only kills it
      # after this deploy step) specifically so this build can reach it.
      prepackage:
        windows:
          shell: pwsh
          run: |
            "WEB_CLIENT_API_BASE_URL=""http://localhost:4100/api""" | Out-File -FilePath .env.local -Encoding utf8
        posix:
          shell: sh
          run: |
            echo WEB_CLIENT_API_BASE_URL=\"http://localhost:4100/api\" > .env.local
      postdeploy:
        windows:
          shell: pwsh
          run: 'rm .env.local'
        posix:
          shell: sh
          run: 'rm .env.local'
  api:
    project: ./src/api
    language: js
    host: function
